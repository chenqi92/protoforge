<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    
    <linearGradient id="anvilGrad" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#2563eb" />
    </linearGradient>

    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fcd34d" />
      <stop offset="100%" stop-color="#f59e0b" />
    </linearGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="256" height="256" rx="56" fill="url(#bgGrad)" />

  <g stroke="#334155" stroke-width="4" fill="none" opacity="0.4" transform="translate(128, 145)">
    <circle cx="0" cy="0" r="46" stroke-width="6" stroke-dasharray="12 12" />
    <circle cx="0" cy="0" r="34" stroke-width="3" />
    <circle cx="0" cy="0" r="14" stroke-width="2" />
  </g>

  <path d="M 90 100 
