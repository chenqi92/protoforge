name: Release

on:
  push:
    tags:
      - 'v*'

# 确保同时只有一个 release 流程在运行
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short
  # Monaco Editor 完整本地打包后 Vite 转译内存需求增大
  NODE_OPTIONS: --max-old-space-size=8192

jobs:
  # ────────────────────────────────────────────────────────────────
  # 构建 Job：多平台并行构建，fail-fast: false 保证部分失败不影响整体
  # ────────────────────────────────────────────────────────────────
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            name: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: Linux-x64

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 系统依赖 ──────────────────────────────────────────────
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libgtk-3-dev

      # ── 工具链 ────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          shared-key: ${{ matrix.target }}

      # ── 前端构建 ──────────────────────────────────────────────
      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      # ── Tauri 构建 ─────────────────────────────────────────────
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tauri updater 签名（可选）
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # 明确使用 npx 而非自动检测的 pnpm，避免 Windows 上 pnpm 未安装导致失败
          tauriScript: npx tauri
          args: --target ${{ matrix.target }}
          # 不让 tauri-action 自动创建 release，由后续 job 统一处理
          tagName: ""
          releaseName: ""

      # ── 收集产物 ──────────────────────────────────────────────
      - name: Collect artifacts (macOS)
        if: startsWith(matrix.platform, 'macos')
        run: |
          mkdir -p dist-artifacts
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.app.tar.gz.sig" \
          \) -exec cp {} dist-artifacts/ \;
          # 重命名文件，附加架构后缀避免冲突
          cd dist-artifacts
          for f in *; do
            base="${f%.*}"
            ext="${f##*.}"
            if [[ "$f" == *.tar.gz.sig ]]; then
              base="${f%.tar.gz.sig}"
              mv "$f" "${base}_${{ matrix.target }}.tar.gz.sig" 2>/dev/null || true
            elif [[ "$f" == *.tar.gz ]]; then
              base="${f%.tar.gz}"
              mv "$f" "${base}_${{ matrix.target }}.tar.gz" 2>/dev/null || true
            elif [[ "$f" == *.dmg ]]; then
              base="${f%.dmg}"
              mv "$f" "${base}_${{ matrix.target }}.dmg" 2>/dev/null || true
            fi
          done
          ls -la

      - name: Collect artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist-artifacts
          $bundlePath = "src-tauri/target/${{ matrix.target }}/release/bundle"
          Get-ChildItem -Path $bundlePath -Recurse -Include "*.msi","*.msi.sig","*.nsis.zip","*.nsis.zip.sig","*.exe" |
            Where-Object { $_.Name -notmatch "^protoforge\.exe$" } |
            Copy-Item -Destination dist-artifacts/
          Get-ChildItem dist-artifacts/

      - name: Collect artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p dist-artifacts
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f \( \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.AppImage" -o \
            -name "*.AppImage.tar.gz" -o \
            -name "*.AppImage.tar.gz.sig" \
          \) -exec cp {} dist-artifacts/ \;
          ls -la dist-artifacts/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.name }}
          path: dist-artifacts/*
          if-no-files-found: warn
          retention-days: 5

  # ────────────────────────────────────────────────────────────────
  # 发布 Job：即使部分构建失败也创建 Release
  # ────────────────────────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest
    # 关键：即使 build job 部分失败也执行
    if: always() && !cancelled()
    name: Create Release

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      # 下载所有成功构建的产物
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: artifacts-*
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "📦 Downloaded artifacts:"
          ls -la all-artifacts/ 2>/dev/null || echo "⚠️ No artifacts found"

      # 生成 Release Notes
      - name: Generate release notes
        id: notes
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          # 检查各平台构建状态
          echo "## 📦 ProtoForge v${VERSION}" > release_notes.md
          echo "" >> release_notes.md

          # 列出可用的安装包
          if [ -d "all-artifacts" ] && [ "$(ls -A all-artifacts 2>/dev/null)" ]; then
            echo "### 下载" >> release_notes.md
            echo "" >> release_notes.md
            echo "| 平台 | 文件 |" >> release_notes.md
            echo "|------|------|" >> release_notes.md
            for f in all-artifacts/*; do
              name=$(basename "$f")
              case "$name" in
                *.dmg) echo "| 🍎 macOS | \`${name}\` |" >> release_notes.md ;;
                *.msi) echo "| 🪟 Windows (MSI) | \`${name}\` |" >> release_notes.md ;;
                *.exe) echo "| 🪟 Windows (EXE) | \`${name}\` |" >> release_notes.md ;;
                *.deb) echo "| 🐧 Linux (deb) | \`${name}\` |" >> release_notes.md ;;
                *.rpm) echo "| 🐧 Linux (rpm) | \`${name}\` |" >> release_notes.md ;;
                *.AppImage) echo "| 🐧 Linux (AppImage) | \`${name}\` |" >> release_notes.md ;;
              esac
            done
            echo "" >> release_notes.md
          fi

          echo "### 更新日志" >> release_notes.md
          echo "" >> release_notes.md
          echo "查看完整更新日志: https://github.com/${{ github.repository }}/compare/...${TAG}" >> release_notes.md

      # 创建 GitHub Release 并上传产物
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ProtoForge v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: all-artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 生成 Tauri updater 所需的 latest.json
      - name: Generate updater manifest
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${GITHUB_REF_NAME}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # 构建 platforms JSON — 签名可选（未配置签名密钥时仍能生成有效的 latest.json）
          PLATFORMS="{}"

          # macOS aarch64
          MAC_ARM_FILE=$(ls all-artifacts/*aarch64-apple-darwin*.tar.gz 2>/dev/null | grep -v '.sig$' | head -1 | xargs basename 2>/dev/null || echo "")
          if [ -n "$MAC_ARM_FILE" ]; then
            MAC_ARM_SIG=$(cat "all-artifacts/${MAC_ARM_FILE}.sig" 2>/dev/null || echo "")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MAC_ARM_SIG" --arg url "${BASE_URL}/${MAC_ARM_FILE}" \
              '. + {"darwin-aarch64": {"signature": $sig, "url": $url}}')
          fi

          # macOS x86_64
          MAC_X64_FILE=$(ls all-artifacts/*x86_64-apple-darwin*.tar.gz 2>/dev/null | grep -v '.sig$' | head -1 | xargs basename 2>/dev/null || echo "")
          if [ -n "$MAC_X64_FILE" ]; then
            MAC_X64_SIG=$(cat "all-artifacts/${MAC_X64_FILE}.sig" 2>/dev/null || echo "")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$MAC_X64_SIG" --arg url "${BASE_URL}/${MAC_X64_FILE}" \
              '. + {"darwin-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Windows x86_64 (prefer nsis.zip over msi)
          WIN_FILE=$(ls all-artifacts/*.nsis.zip 2>/dev/null | head -1 | xargs basename 2>/dev/null || \
                     ls all-artifacts/*_x64-setup.exe 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          if [ -n "$WIN_FILE" ]; then
            WIN_SIG=$(cat "all-artifacts/${WIN_FILE}.sig" 2>/dev/null || echo "")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$WIN_SIG" --arg url "${BASE_URL}/${WIN_FILE}" \
              '. + {"windows-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # Linux x86_64
          LINUX_FILE=$(ls all-artifacts/*.AppImage.tar.gz 2>/dev/null | grep -v '.sig$' | head -1 | xargs basename 2>/dev/null || \
                       ls all-artifacts/*.AppImage 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          if [ -n "$LINUX_FILE" ]; then
            LINUX_SIG=$(cat "all-artifacts/${LINUX_FILE}.sig" 2>/dev/null || echo "")
            PLATFORMS=$(echo "$PLATFORMS" | jq --arg sig "$LINUX_SIG" --arg url "${BASE_URL}/${LINUX_FILE}" \
              '. + {"linux-x86_64": {"signature": $sig, "url": $url}}')
          fi

          # 生成 latest.json
          jq -n \
            --arg version "$VERSION" \
            --arg notes "ProtoForge v${VERSION}" \
            --arg date "$DATE" \
            --argjson platforms "$PLATFORMS" \
            '{version: $version, notes: $notes, pub_date: $date, platforms: $platforms}' \
            > latest.json

          echo "📝 Generated latest.json:"
          cat latest.json

      - name: Upload updater manifest
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: latest.json
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 🎉 Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** v${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -d "all-artifacts" ] && [ "$(ls -A all-artifacts 2>/dev/null)" ]; then
            echo "### Uploaded artifacts:" >> $GITHUB_STEP_SUMMARY
            for f in all-artifacts/*; do
              echo "- \`$(basename $f)\`" >> $GITHUB_STEP_SUMMARY
            done
          else
            echo "⚠️ No artifacts were uploaded." >> $GITHUB_STEP_SUMMARY
          fi

      # 清理旧版本，仅保留最新 3 个 Release
      - name: Cleanup old releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEEP=3
          echo "🧹 Cleaning up old releases (keeping latest $KEEP)..."

          # 按创建时间降序获取所有 release 的 tag
          TAGS=$(gh release list --repo "${{ github.repository }}" --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse | .[].tagName')

          COUNT=0
          for TAG in $TAGS; do
            COUNT=$((COUNT + 1))
            if [ $COUNT -gt $KEEP ]; then
              echo "  🗑️ Deleting release & tag: $TAG"
              gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag 2>/dev/null || true
            else
              echo "  ✅ Keeping: $TAG"
            fi
          done

          echo "✨ Cleanup complete. Kept $KEEP latest releases."
