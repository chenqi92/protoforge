<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.08"/>
    </filter>

    <pattern id="dotGrid" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#cbd5e1" opacity="0.4" />
    </pattern>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bgLight)" stroke="#e2e8f0" stroke-width="2"/>
  <rect width="512" height="512" rx="112" fill="url(#dotGrid)" />

  <g filter="url(#softShadow)">

    <polygon points="275,275 330,380 365,360 440,440 370,310 335,330"
             fill="url(#boltGrad)" stroke="#f59e0b" stroke-width="8" stroke-linejoin="round"/>

    <circle cx="410" cy="460" r="5" fill="#f59e0b" />
    <circle cx="440" cy="410" r="7" fill="#fbbf24" />

    <circle cx="210" cy="210" r="100" fill="#ffffff" stroke="#2563eb" stroke-width="24" />

    <path d="M 60 280 Q 100 250 140 220" fill="none" stroke="#94a3b8" stroke-width="6" stroke-dasharray="8 8" stroke-linecap="round"/>

    <g transform="translate(10, -10)">
      <polygon points="140,190 260,160 200,210" fill="#38bdf8" />
      <polygon points="180,250 260,160 200,210" fill="#0284c7" />
    </g>

    <line x1="122" y1="210" x2="298" y2="210" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>
    <path d="M 122 210 L 298 210 A 88 88 0 0 1 122 210" fill="#10b981" opacity="0.15" />

    <path d="M 140 150 A 70 70 0 0 1 250 135" fill="none" stroke="#e0f2fe" stroke-width="8" stroke-linecap="round" />
  </g>
</svg>
